# ~/.tmux.conf — config minimalista, foco em sessões persistentes
#
# Por que tmux com Ghostty? Ghostty já tem splits e tabs, mas:
#   - Ghostty fechou = sessão perdida
#   - Tmux: sessão sobrevive a fechar terminal, reboot (com tmux-resurrect),
#           SSH desconexão, e tu reconecta com `tmux attach`
#   - Mesma config funciona local e em qualquer servidor remoto
#
# Setup:
#   brew install tmux
#   cp tmux.conf ~/.tmux.conf
#   tmux source ~/.tmux.conf  (se já estiver numa sessão)
#
# Plugins (opcional mas recomendado):
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#   tmux start
#   prefix + I  (instala plugins listados abaixo)
#
# Workflow básico:
#   tmux new -s work     # cria sessão "work"
#   prefix + d           # detach (sessão continua viva em background)
#   tmux ls              # lista sessões
#   tmux attach -t work  # volta pra sessão
#
# Em servidor remoto:
#   ssh server -t "tmux new -A -s remote"
#   # cria ou anexa em "remote", se cair SSH o trabalho continua

# =====================================================================
# Prefix: troca C-b (default) por C-a (mais ergonômico)
# =====================================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =====================================================================
# Comportamento básico
# =====================================================================
set -g mouse on                          # mouse habilitado (scroll, resize)
set -g base-index 1                      # janelas começam em 1
setw -g pane-base-index 1                # painéis começam em 1
set -g renumber-windows on               # renumera ao fechar janela
set -g history-limit 50000               # buffer de scroll generoso
set -sg escape-time 0                    # sem delay no Esc (importante pra vim)
set -g focus-events on                   # autoread do vim funciona
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc,xterm-ghostty:Tc"

# =====================================================================
# Splits mais intuitivos
# =====================================================================
# Default é % (vertical) e " (horizontal) — pouco mnemônico.
# Mudamos para | (vertical) e - (horizontal), mantém CWD da pane atual.
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Nova janela mantém CWD
bind c new-window -c "#{pane_current_path}"

# =====================================================================
# Navegação entre panes (vim-style)
# =====================================================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize com prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =====================================================================
# Reload config rápido
# =====================================================================
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# =====================================================================
# Modo cópia (vim-style)
# =====================================================================
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# =====================================================================
# Visual: status bar simples
# =====================================================================
set -g status-position top
set -g status-style bg=default,fg=white
set -g status-left "#[fg=green,bold] #S "
set -g status-right "#[fg=cyan]%H:%M #[fg=yellow]%d-%b "
set -g status-left-length 30
setw -g window-status-current-style fg=black,bg=cyan,bold
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# =====================================================================
# Plugins (TPM) — descomenta após instalar tpm
# =====================================================================
